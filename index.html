<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCPife — Resolução de Objetivos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181b22;
    --border: #1e2330;
    --border2: #2a3045;
    --green: #00ff88;
    --green2: #00cc6a;
    --green-dim: rgba(0,255,136,0.08);
    --green-glow: rgba(0,255,136,0.15);
    --amber: #ffb347;
    --blue: #4da6ff;
    --red: #ff5f5f;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4a5568;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  /* Scanline */
  body::after {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events:none;
    z-index:1;
  }

  #app { position:relative; z-index:2; min-height:100vh; }

  /* ── HOME ── */
  #page-home {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:2rem;
    text-align:center;
  }
  .logo-badge {
    display:inline-flex; align-items:center; gap:.5rem;
    background: var(--green-dim);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius:4px;
    padding:.3rem .8rem;
    font-size:.7rem; letter-spacing:.2em; color:var(--green2);
    margin-bottom:1.5rem;
    text-transform:uppercase;
  }
  .logo-badge span { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  h1.title {
    font-family:var(--sans); font-size:clamp(3rem,10vw,6.5rem); font-weight:800;
    line-height:1; letter-spacing:-.02em;
    background: linear-gradient(135deg, #fff 30%, var(--green) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:.75rem;
  }
  .subtitle {
    font-family:var(--sans); font-size:clamp(.8rem,2vw,1rem); font-weight:400;
    color:var(--text2); letter-spacing:.1em; text-transform:uppercase;
    margin-bottom:3rem;
  }
  .obj-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
    gap:1px;
    background:var(--border);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
    max-width:900px; width:100%;
    margin-bottom:2rem;
  }
  .obj-card {
    background:var(--surface);
    padding:1.25rem 1.5rem;
    cursor:pointer;
    transition: background .15s;
    text-align:left;
    border:none; outline:none;
    color:inherit; font-family:inherit;
    text-decoration:none; display:block;
  }
  .obj-card:hover { background:var(--surface2); }
  .obj-card:hover .obj-arrow { transform:translateX(4px); color:var(--green); }
  .obj-num {
    font-size:.65rem; letter-spacing:.15em; color:var(--green2);
    margin-bottom:.4rem; text-transform:uppercase;
  }
  .obj-proto {
    font-family:var(--sans); font-size:1rem; font-weight:600;
    color:var(--text); margin-bottom:.2rem;
  }
  .obj-desc { font-size:.7rem; color:var(--text2); line-height:1.4; }
  .obj-arrow { display:inline-block; transition: transform .2s, color .2s; color:var(--text3); font-size:.9rem; float:right; margin-top:.2rem; }

  /* ── OBJECTIVE PAGE ── */
  #page-objective { display:none; min-height:100vh; padding:2rem; max-width:760px; margin:0 auto; }
  
  .nav-back {
    display:inline-flex; align-items:center; gap:.5rem;
    color:var(--text2); font-size:.75rem; letter-spacing:.1em;
    text-decoration:none; cursor:pointer; background:none; border:none;
    font-family:inherit; padding:.5rem 0; margin-bottom:2rem;
    transition:color .15s;
    text-transform:uppercase;
  }
  .nav-back:hover { color:var(--green); }

  .obj-header { margin-bottom:2rem; }
  .obj-tag {
    display:inline-block;
    background:var(--green-dim); border:1px solid rgba(0,255,136,0.2);
    color:var(--green2); font-size:.65rem; letter-spacing:.15em; padding:.25rem .6rem;
    border-radius:3px; text-transform:uppercase; margin-bottom:1rem;
  }
  .obj-title {
    font-family:var(--sans); font-size:clamp(1.4rem,5vw,2.2rem); font-weight:800;
    line-height:1.1; color:var(--text); margin-bottom:.5rem;
  }
  .obj-title .proto-accent { color:var(--green); }

  /* Scenario card */
  .scenario-box {
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:8px;
    padding:1.5rem;
    margin-bottom:2rem;
    position:relative;
    overflow:hidden;
  }
  .scenario-box::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--amber);
  }
  .scenario-label {
    font-size:.6rem; letter-spacing:.2em; color:var(--amber); text-transform:uppercase;
    margin-bottom:.5rem;
  }
  .scenario-text {
    font-family:var(--sans); font-size:1rem; color:var(--text);
    line-height:1.6; font-weight:400;
  }

  /* Options selector */
  .options-label {
    font-size:.65rem; letter-spacing:.15em; color:var(--text3); text-transform:uppercase;
    margin-bottom:.75rem;
  }
  .options-row {
    display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:2rem;
  }
  .opt-btn {
    background:var(--surface); border:1px solid var(--border2);
    color:var(--text2); font-family:var(--mono); font-size:.75rem;
    padding:.4rem .9rem; border-radius:3px; cursor:pointer;
    transition:all .15s; letter-spacing:.05em;
  }
  .opt-btn:hover { border-color:var(--green2); color:var(--green); background:var(--green-dim); }
  .opt-btn.active { border-color:var(--green); color:var(--green); background:var(--green-dim); }

  /* Answer reveal */
  .reveal-section { margin-bottom:2rem; }
  .reveal-btn {
    width:100%;
    background:transparent;
    border:1px solid var(--border2);
    border-radius:8px;
    color:var(--text2); font-family:var(--mono); font-size:.8rem;
    padding:1rem 1.5rem; cursor:pointer;
    transition:all .2s; letter-spacing:.1em;
    text-transform:uppercase;
    display:flex; align-items:center; justify-content:center; gap:.75rem;
  }
  .reveal-btn:hover { border-color:var(--green); color:var(--green); background:var(--green-dim); }
  .reveal-btn .icon { font-size:1rem; transition:transform .3s; }
  .reveal-btn.open .icon { transform:rotate(180deg); }

  .answer-panel {
    display:none;
    margin-top:.5rem;
    background:var(--surface);
    border:1px solid rgba(0,255,136,0.2);
    border-radius:8px;
    padding:1.75rem 1.5rem;
    animation:slideDown .25s ease;
  }
  .answer-panel.open { display:block; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  .answer-label {
    font-size:.6rem; letter-spacing:.2em; color:var(--green2); text-transform:uppercase;
    margin-bottom:1rem;
  }

  /* Protocol chain */
  .chain {
    display:flex; align-items:center; flex-wrap:wrap; gap:.5rem;
    margin-bottom:1.75rem;
  }
  .chain-node {
    background:var(--bg);
    border:1px solid var(--border2);
    border-radius:5px;
    padding:.5rem 1.1rem;
    font-family:var(--sans); font-size:.95rem; font-weight:600;
    color:var(--text);
    position:relative;
  }
  .chain-node.layer-app { border-color:rgba(0,255,136,0.4); color:var(--green); }
  .chain-node.layer-transport { border-color:rgba(77,166,255,0.4); color:var(--blue); }
  .chain-node.layer-network { border-color:rgba(255,179,71,0.4); color:var(--amber); }
  .chain-node.layer-only-network { border-color:rgba(255,179,71,0.4); color:var(--amber); }
  .chain-arrow { color:var(--text3); font-size:1.1rem; flex-shrink:0; }

  .chain-legend {
    display:flex; flex-wrap:wrap; gap:1rem;
    margin-bottom:1.5rem;
  }
  .legend-item {
    display:flex; align-items:center; gap:.4rem;
    font-size:.65rem; letter-spacing:.05em; color:var(--text2);
  }
  .legend-dot {
    width:8px; height:8px; border-radius:2px; flex-shrink:0;
  }
  .legend-dot.app { background:var(--green); }
  .legend-dot.transport { background:var(--blue); }
  .legend-dot.network { background:var(--amber); }

  /* Explanation */
  .explain-box {
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:6px;
    padding:1.25rem;
  }
  .explain-box p {
    font-family:var(--sans); font-size:.875rem; color:var(--text2);
    line-height:1.7; margin-bottom:.75rem;
  }
  .explain-box p:last-child { margin-bottom:0; }
  .explain-box strong { color:var(--text); font-weight:600; }
  .explain-box .proto-tag {
    display:inline-block; background:var(--green-dim); color:var(--green2);
    font-family:var(--mono); font-size:.7rem; padding:.1rem .4rem; border-radius:3px;
    margin: 0 .1rem;
  }

  /* Port badge */
  .port-info {
    margin-top:1rem;
    display:flex; flex-wrap:wrap; gap:.5rem;
  }
  .port-badge {
    font-size:.65rem; letter-spacing:.08em;
    background:var(--surface2); border:1px solid var(--border2);
    border-radius:3px; padding:.2rem .6rem; color:var(--text2);
  }
  .port-badge strong { color:var(--text); }

  /* Footer */
  footer {
    text-align:center; padding:2rem;
    font-size:.65rem; letter-spacing:.1em; color:var(--text3);
    text-transform:uppercase; position:relative; z-index:2;
  }

  /* Responsive */
  @media(max-width:500px) {
    .chain { gap:.3rem; }
    .chain-node { padding:.4rem .7rem; font-size:.8rem; }
  }
</style>
</head>
<body>
<div id="app">

<!-- HOME PAGE -->
<div id="page-home">
  <div class="logo-badge"><span></span> Protocolo de Redes</div>
  <h1 class="title">TCPife</h1>
  <p class="subtitle">Escaneie · Resolva · Vença</p>
  <div class="obj-grid" id="obj-grid"></div>
  <p style="font-size:.65rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;">Selecione o objetivo da sua carta</p>
</div>

<!-- OBJECTIVE PAGE -->
<div id="page-objective">
  <button class="nav-back" onclick="goHome()">← Voltar ao início</button>
  <div class="obj-header">
    <div class="obj-tag" id="obj-tag">Objetivo 01</div>
    <h2 class="obj-title" id="obj-title"></h2>
  </div>

  <div class="scenario-box">
    <div class="scenario-label">⬡ Cenário</div>
    <p class="scenario-text" id="scenario-text"></p>
  </div>

  <div class="options-label">Variações do objetivo:</div>
  <div class="options-row" id="options-row"></div>

  <div class="reveal-section">
    <button class="reveal-btn" id="reveal-btn" onclick="toggleReveal()">
      <span class="icon">▼</span>
      <span>Revelar caminho</span>
    </button>
    <div class="answer-panel" id="answer-panel">
      <div class="answer-label">✓ Caminho correto</div>
      <div class="chain" id="chain-display"></div>
      <div class="chain-legend">
        <div class="legend-item"><div class="legend-dot app"></div>Camada de Aplicação</div>
        <div class="legend-item"><div class="legend-dot transport"></div>Camada de Transporte</div>
        <div class="legend-item"><div class="legend-dot network"></div>Camada de Rede</div>
      </div>
      <div class="explain-box" id="explain-box"></div>
      <div class="port-info" id="port-info"></div>
    </div>
  </div>
</div>

</div>

<footer>TCPife &mdash; Jogo de Protocolos de Redes</footer>

<script>
const OBJECTIVES = [
  {
    id: 'objetivo1',
    num: '01',
    proto: 'SMTP',
    title: 'Envio de E-mail',
    shortDesc: 'Enviar mensagens via servidor de e-mail',
    options: [
      'Seu chefe solicita os relatórios da empresa até o fim do dia. Após finalizar o trabalho, você precisa enviá-los por e-mail.',
      'Você terminou um projeto importante e precisa enviar os arquivos para sua equipe por e-mail.',
      'Você está se candidatando a uma vaga e precisa enviar seu currículo por e-mail.',
    ],
    chain: [
      { label:'SMTP', layer:'app' },
      { label:'TCP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'SMTP', val:'Porta 25 / 587 / 465' }, { label:'TCP', val:'Orientado a conexão' }],
    explain: `<p>O <span class="proto-tag">SMTP</span> (Simple Mail Transfer Protocol) é o protocolo da <strong>camada de aplicação</strong> responsável pelo <strong>envio</strong> de e-mails entre servidores e clientes.</p><p>Para garantir entrega confiável, o SMTP usa o <span class="proto-tag">TCP</span> (Transmission Control Protocol) na camada de transporte — que estabelece conexão, verifica erros e retransmite pacotes perdidos.</p><p>O <span class="proto-tag">IP</span> (Internet Protocol) na camada de rede cuida do roteamento, definindo o endereço de origem e destino de cada pacote na rede.</p>`,
  },
  {
    id: 'objetivo2',
    num: '02',
    proto: 'POP3',
    title: 'Download de E-mails',
    shortDesc: 'Baixar e-mails do servidor para o dispositivo',
    options: [
      'Você vai viajar e ficará sem internet. Antes de sair, você precisa baixar todos os seus e-mails para acessá-los offline.',
      'Você utiliza um computador compartilhado e precisa baixar seus e-mails para uma máquina específica, sem manter cópias no servidor.',
      'Você precisa liberar espaço no servidor de e-mail e decide baixar todas as mensagens para o seu computador, removendo-as do servidor.',
    ],
    chain: [
      { label:'POP3', layer:'app' },
      { label:'TCP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'POP3', val:'Porta 110 / 995 (SSL)' }, { label:'Comportamento', val:'Remove do servidor' }],
    explain: `<p>O <span class="proto-tag">POP3</span> (Post Office Protocol v3) é um protocolo da <strong>camada de aplicação</strong> que faz o <strong>download</strong> de e-mails do servidor para o dispositivo local — geralmente removendo as mensagens do servidor após a transferência.</p><p>Diferente do IMAP, o POP3 não sincroniza: ideal para acesso offline em um único dispositivo.</p><p>Usa <span class="proto-tag">TCP</span> para garantir entrega confiável e completa dos dados, e o <span class="proto-tag">IP</span> para endereçamento e roteamento na rede.</p>`,
  },
  {
    id: 'objetivo3',
    num: '03',
    proto: 'IMAP',
    title: 'Sincronização de E-mails',
    shortDesc: 'Acessar e-mails sincronizados em múltiplos dispositivos',
    options: [
      'Você acessa seus e-mails pelo celular e pelo computador, mantendo tudo sincronizado em ambos os dispositivos.',
      'Você está organizando seus e-mails em pastas diretamente no servidor, sem fazer download das mensagens para o dispositivo.',
      'Você está organizando seus e-mails em pastas diretamente no servidor, sem baixar as mensagens para o dispositivo.',
    ],
    chain: [
      { label:'IMAP', layer:'app' },
      { label:'TCP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'IMAP', val:'Porta 143 / 993 (SSL)' }, { label:'Comportamento', val:'Mantém no servidor' }],
    explain: `<p>O <span class="proto-tag">IMAP</span> (Internet Message Access Protocol) sincroniza e-mails entre o servidor e múltiplos dispositivos. As mensagens ficam <strong>armazenadas no servidor</strong>, e o cliente visualiza cópias sincronizadas.</p><p>É ideal para quem acessa o e-mail em vários dispositivos — celular, computador, tablet — já que qualquer ação (ler, mover, deletar) reflete em todos.</p><p>Assim como o POP3 e o SMTP, usa <span class="proto-tag">TCP</span> para comunicação confiável e <span class="proto-tag">IP</span> para roteamento dos pacotes.</p>`,
  },
  {
    id: 'objetivo4',
    num: '04',
    proto: 'HTTP/HTTPS',
    title: 'Navegação na Web',
    shortDesc: 'Acessar sites e páginas na internet',
    options: [
      'Você abre o navegador para acessar o site da sua escola.',
      'Você entra em um portal de notícias para ler as manchetes do dia.',
      'Você acessa um site para assistir conteúdos online.',
    ],
    chain: [
      { label:'HTTP/HTTPS', layer:'app' },
      { label:'TCP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'HTTP', val:'Porta 80' }, { label:'HTTPS', val:'Porta 443 (TLS/SSL)' }],
    explain: `<p>O <span class="proto-tag">HTTP</span> (HyperText Transfer Protocol) é o protocolo de aplicação usado para transferir páginas web. O <span class="proto-tag">HTTPS</span> é a versão segura, com criptografia TLS/SSL.</p><p>O navegador envia uma requisição HTTP ao servidor, que responde com o conteúdo da página (HTML, CSS, JS, imagens).</p><p>O <span class="proto-tag">TCP</span> garante que todos os dados cheguem na ordem certa e sem erros. O <span class="proto-tag">IP</span> roteia os pacotes entre o seu dispositivo e o servidor web.</p>`,
  },
  {
    id: 'objetivo5',
    num: '05',
    proto: 'HTTPS',
    title: 'Conexão Segura',
    shortDesc: 'Acessar sistemas que exigem segurança e criptografia',
    options: [
      'Você entra no aplicativo do banco para verificar seu saldo.',
      'Você faz login em um sistema que exige segurança dos dados.',
      'Você realiza uma compra online inserindo seus dados pessoais.',
    ],
    chain: [
      { label:'HTTPS', layer:'app' },
      { label:'TCP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'HTTPS', val:'Porta 443' }, { label:'Segurança', val:'TLS 1.2 / 1.3' }],
    explain: `<p>O <span class="proto-tag">HTTPS</span> é a versão segura do HTTP, adicionando uma camada de criptografia <strong>TLS/SSL</strong> que protege os dados transmitidos contra interceptação.</p><p>É obrigatório em transações financeiras, login e qualquer troca de dados sensíveis. O cadeado no navegador indica uma conexão HTTPS ativa.</p><p>Embora a criptografia adicione complexidade, o <span class="proto-tag">TCP</span> continua sendo o protocolo de transporte, garantindo integridade. O <span class="proto-tag">IP</span> cuida do endereçamento e roteamento.</p>`,
  },
  {
    id: 'objetivo6',
    num: '06',
    proto: 'DNS',
    title: 'Resolução de Nomes',
    shortDesc: 'Traduzir nomes de domínio para endereços IP',
    options: [
      'Você digita um endereço de site, mas o computador precisa descobrir o IP correspondente.',
      'Antes de acessar um site, o sistema precisa traduzir o nome para um endereço numérico.',
      'Seu dispositivo precisa localizar um servidor a partir do nome digitado.',
    ],
    chain: [
      { label:'DNS', layer:'app' },
      { label:'UDP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'DNS', val:'Porta 53' }, { label:'Protocolo', val:'UDP (padrão) / TCP (zonas)' }],
    explain: `<p>O <span class="proto-tag">DNS</span> (Domain Name System) traduz nomes legíveis por humanos (como <em>google.com</em>) em endereços IP que os computadores entendem.</p><p>Usa <span class="proto-tag">UDP</span> (User Datagram Protocol) ao invés de TCP — pois consultas DNS são pequenas e rápidas, não precisando da sobrecarga de uma conexão orientada. A velocidade importa mais que a garantia de entrega nesse caso.</p><p>O <span class="proto-tag">IP</span> roteia a consulta ao servidor DNS correto na rede.</p>`,
  },
  {
    id: 'objetivo7',
    num: '07',
    proto: 'FTP',
    title: 'Transferência de Arquivos',
    shortDesc: 'Fazer upload ou download de arquivos em servidores',
    options: [
      'Você precisa baixar um arquivo grande de um servidor.',
      'Um funcionário precisa transferir um arquivo diretamente para um servidor remoto da empresa.',
      'Você faz upload de arquivos para um servidor remoto.',
    ],
    chain: [
      { label:'FTP', layer:'app' },
      { label:'TCP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'FTP Controle', val:'Porta 21' }, { label:'FTP Dados', val:'Porta 20' }],
    explain: `<p>O <span class="proto-tag">FTP</span> (File Transfer Protocol) permite a transferência de arquivos entre cliente e servidor. Usa <strong>duas conexões TCP</strong> separadas: uma para controle (comandos) na porta 21 e outra para transferência de dados na porta 20.</p><p>Ideal para upload e download de arquivos grandes em servidores remotos. Versões seguras incluem FTPS (com TLS) e SFTP (sobre SSH).</p><p>O <span class="proto-tag">TCP</span> garante que o arquivo seja transferido completo e sem corrupção. O <span class="proto-tag">IP</span> roteia os pacotes na rede.</p>`,
  },
  {
    id: 'objetivo8',
    num: '08',
    proto: 'SSH',
    title: 'Acesso Remoto Seguro',
    shortDesc: 'Controlar servidores remotamente com segurança',
    options: [
      'Você acessa remotamente um servidor para manutenção com segurança.',
      'Um administrador precisa controlar um servidor à distância de forma segura.',
      'Você acessa remotamente um servidor da empresa utilizando um terminal seguro para executar comandos.',
    ],
    chain: [
      { label:'SSH', layer:'app' },
      { label:'TCP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'SSH', val:'Porta 22' }, { label:'Segurança', val:'Criptografia assimétrica' }],
    explain: `<p>O <span class="proto-tag">SSH</span> (Secure Shell) permite acesso remoto a servidores com <strong>criptografia de ponta-a-ponta</strong>. Todo o tráfego — incluindo senhas e comandos — é criptografado.</p><p>É o padrão para administração remota de servidores Linux/Unix. Substituiu o Telnet, que enviava dados sem criptografia.</p><p>Usa <span class="proto-tag">TCP</span> para garantir uma sessão confiável e contínua, e o <span class="proto-tag">IP</span> para localizar e alcançar o servidor remoto na rede.</p>`,
  },
  {
    id: 'objetivo9',
    num: '09',
    proto: 'DHCP',
    title: 'Configuração Automática de Rede',
    shortDesc: 'Receber endereço IP automaticamente ao conectar',
    options: [
      'Você conecta seu celular ao Wi-Fi e recebe um endereço IP automaticamente.',
      'Um computador entra na rede e precisa ser configurado automaticamente.',
      'Ao ligar um notebook novo, ele recebe configurações de rede sem intervenção manual.',
    ],
    chain: [
      { label:'DHCP', layer:'app' },
      { label:'UDP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'DHCP Servidor', val:'Porta 67' }, { label:'DHCP Cliente', val:'Porta 68' }],
    explain: `<p>O <span class="proto-tag">DHCP</span> (Dynamic Host Configuration Protocol) distribui automaticamente endereços IP e configurações de rede (gateway, DNS) para dispositivos que entram na rede.</p><p>Usa <span class="proto-tag">UDP</span> porque a comunicação inicial ocorre via <strong>broadcast</strong> — antes de o dispositivo ter um IP atribuído — e o UDP suporta broadcasts, enquanto o TCP exige conexão prévia.</p><p>O <span class="proto-tag">IP</span> entra em cena após a atribuição do endereço, possibilitando comunicação na rede.</p>`,
  },
  {
    id: 'objetivo10',
    num: '10',
    proto: 'ICMP',
    title: 'Diagnóstico de Rede (Ping)',
    shortDesc: 'Verificar conectividade e disponibilidade de dispositivos',
    options: [
      'Um técnico precisa verificar se um servidor está online após uma falha.',
      'Você utiliza um comando para verificar se outro dispositivo na rede está respondendo (ping).',
    ],
    chain: [
      { label:'ICMP', layer:'app' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'ICMP', val:'Sem porta (protocolo de controle)' }, { label:'Comando', val:'ping / traceroute' }],
    explain: `<p>O <span class="proto-tag">ICMP</span> (Internet Control Message Protocol) é usado para diagnóstico de rede. O comando <strong>ping</strong> envia um pacote ICMP Echo Request e aguarda um Echo Reply — confirmando que o destino está acessível.</p><p>O ICMP opera diretamente sobre o <span class="proto-tag">IP</span>, <strong>sem usar TCP ou UDP</strong>. Não é orientado a conexão nem transfere dados de aplicação — é um protocolo de controle e erros da camada de rede.</p><p>Por isso, o caminho é apenas ICMP → IP, sem camada de transporte intermediária.</p>`,
  },
  {
    id: 'objetivo11',
    num: '11',
    proto: 'UDP',
    title: 'Comunicação em Tempo Real',
    shortDesc: 'Jogos online e chamadas de voz com baixa latência',
    options: [
      'Você está jogando online e precisa de resposta rápida.',
      'Você participa de uma chamada de voz onde atrasos prejudicam a comunicação.',
    ],
    chain: [
      { label:'UDP', layer:'transport' },
      { label:'IP', layer:'network' },
    ],
    ports: [{ label:'UDP', val:'Sem conexão, sem garantia' }, { label:'Vantagem', val:'Baixíssima latência' }],
    explain: `<p>O <span class="proto-tag">UDP</span> (User Datagram Protocol) é um protocolo de transporte sem conexão — ele envia pacotes sem verificar se chegaram, sem retransmissão e sem ordenação.</p><p>Isso resulta em <strong>latência muito baixa</strong>, essencial para jogos online e chamadas de voz onde um atraso de décimos de segundo é perceptível e inaceitável. Perder um pacote é melhor que esperar por ele.</p><p>Nota: aqui o <strong>protocolo de aplicação não aparece</strong> porque a questão foca na camada de transporte (UDP) diretamente sobre o <span class="proto-tag">IP</span>. Aplicações como jogos e VoIP usam UDP, mas o protocolo de aplicação varia.</p>`,
  },
];

let currentObj = null;
let currentOptionIdx = 0;
let revealOpen = false;

function renderHome() {
  const grid = document.getElementById('obj-grid');
  grid.innerHTML = OBJECTIVES.map(o => `
    <a class="obj-card" href="#${o.id}" onclick="navigateTo('${o.id}'); return false;">
      <div class="obj-num">Objetivo ${o.num}</div>
      <div class="obj-proto">${o.proto}<span class="obj-arrow">→</span></div>
      <div class="obj-desc">${o.shortDesc}</div>
    </a>
  `).join('');
}

function navigateTo(id) {
  const obj = OBJECTIVES.find(o => o.id === id);
  if (!obj) return;
  currentObj = obj;
  currentOptionIdx = 0;
  revealOpen = false;
  window.location.hash = id;
  renderObjective();
}

function renderObjective() {
  const obj = currentObj;
  if (!obj) return;

  document.getElementById('page-home').style.display = 'none';
  document.getElementById('page-objective').style.display = 'block';

  document.getElementById('obj-tag').textContent = `Objetivo ${obj.num} — ${obj.proto}`;
  document.getElementById('obj-title').innerHTML = `<span class="proto-accent">${obj.proto}</span> → ${buildChainTitle(obj.chain)}`;

  renderScenario();
  renderOptions();

  // Reset reveal
  const panel = document.getElementById('answer-panel');
  const btn = document.getElementById('reveal-btn');
  panel.classList.remove('open');
  btn.classList.remove('open');
  revealOpen = false;

  renderChain();
  renderExplain();

  window.scrollTo({top:0, behavior:'smooth'});
}

function buildChainTitle(chain) {
  return chain.slice(1).map(n => n.label).join(' → ');
}

function renderScenario() {
  document.getElementById('scenario-text').textContent = currentObj.options[currentOptionIdx];
}

function renderOptions() {
  const row = document.getElementById('options-row');
  row.innerHTML = currentObj.options.map((_, i) => `
    <button class="opt-btn ${i===currentOptionIdx?'active':''}" onclick="selectOption(${i})">Opção ${i+1}</button>
  `).join('');
}

function selectOption(idx) {
  currentOptionIdx = idx;
  renderScenario();
  renderOptions();
  // Reset reveal when switching option
  const panel = document.getElementById('answer-panel');
  const btn = document.getElementById('reveal-btn');
  panel.classList.remove('open');
  btn.classList.remove('open');
  revealOpen = false;
}

function renderChain() {
  const chain = currentObj.chain;
  const el = document.getElementById('chain-display');
  let html = '';
  chain.forEach((node, i) => {
    html += `<div class="chain-node layer-${node.layer}">${node.label}</div>`;
    if (i < chain.length - 1) html += `<span class="chain-arrow">→</span>`;
  });
  el.innerHTML = html;
}

function renderExplain() {
  document.getElementById('explain-box').innerHTML = currentObj.explain;
  const ports = document.getElementById('port-info');
  ports.innerHTML = currentObj.ports.map(p =>
    `<div class="port-badge"><strong>${p.label}:</strong> ${p.val}</div>`
  ).join('');
}

function toggleReveal() {
  revealOpen = !revealOpen;
  const panel = document.getElementById('answer-panel');
  const btn = document.getElementById('reveal-btn');
  panel.classList.toggle('open', revealOpen);
  btn.classList.toggle('open', revealOpen);
  if (revealOpen) {
    setTimeout(() => panel.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
  }
}

function goHome() {
  document.getElementById('page-home').style.display = 'flex';
  document.getElementById('page-objective').style.display = 'none';
  window.location.hash = '';
  currentObj = null;
  window.scrollTo({top:0});
}

function handleHash() {
  const hash = window.location.hash.replace('#','');
  if (!hash) {
    document.getElementById('page-home').style.display = 'flex';
    document.getElementById('page-objective').style.display = 'none';
    currentObj = null;
    return;
  }
  const obj = OBJECTIVES.find(o => o.id === hash);
  if (obj) {
    currentObj = obj;
    currentOptionIdx = 0;
    revealOpen = false;
    renderObjective();
  }
}

window.addEventListener('hashchange', handleHash);

renderHome();
handleHash();
</script>
</body>
</html>
